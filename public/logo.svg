<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 150" width="100%" height="100%">
  <defs>
    <!-- Top Face Gradient -->
    <linearGradient id="topGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5599e0" />
      <stop offset="100%" stop-color="#2264ad" />
    </linearGradient>
    
    <!-- Left Face Gradient -->
    <linearGradient id="leftGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#123b6b" />
      <stop offset="100%" stop-color="#081e36" />
    </linearGradient>

    <!-- Right Face Gradient -->
    <linearGradient id="rightGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e315b" />
      <stop offset="100%" stop-color="#06162b" />
    </linearGradient>
  </defs>

  <!-- 3D Isometric Cube Group -->
  <g transform="translate(10, 5)">
    <!-- Left Face -->
    <polygon points="31.7,50 31.7,100 75,125 75,75" fill="url(#leftGrad)" />
    
    <!-- Right Face -->
    <polygon points="75,75 75,125 118.3,100 118.3,50" fill="url(#rightGrad)" />
    
    <!-- Top Face -->
    <polygon points="75,25 31.7,50 75,75 118.3,50" fill="url(#topGrad)" />

    <!-- Top Grid lines (2x2 grid) -->
    <line x1="53.35" y1="37.5" x2="96.65" y2="62.5" stroke="#ffffff" stroke-width="1.2" stroke-opacity="0.5" />
    <line x1="53.35" y1="62.5" x2="96.65" y2="37.5" stroke="#ffffff" stroke-width="1.2" stroke-opacity="0.5" />

    <!-- Left Face vertical divisions (4 columns) -->
    <line x1="42.525" y1="56.25" x2="42.525" y2="106.25" stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.25" />
    <line x1="53.35" y1="62.5" x2="53.35" y2="112.5" stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.25" />
    <line x1="64.175" y1="68.75" x2="64.175" y2="118.75" stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.25" />

    <!-- Right Face vertical divisions (4 columns) -->
    <line x1="85.825" y1="68.75" x2="85.825" y2="118.75" stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.2" />
    <line x1="96.65" y1="62.5" x2="96.65" y2="112.5" stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.2" />
    <line x1="107.475" y1="56.25" x2="107.475" y2="106.25" stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.2" />
  </g>

  <!-- Typography matching logo -->
  <!-- "RUKN" text -->
  <text x="145" y="76" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="56" fill="#1e3a8a" letter-spacing="0.5">RUKN</text>
  
  <!-- "BIM API" text -->
  <text x="145" y="112" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-weight="500" font-size="25" fill="#64748b" letter-spacing="7.5">BIM API</text>
</svg>
